body:
  text: 附錄詩詩迢迢雲端月的爍霞間星清商激西牖澄景至南櫺書鈔百五十四杜公瞻編珠一詩詩野馬閑於羈澤雉屈於樊神王自有所何為人世間御覽三百五十九正像論正像論士行散形於于闐呂韶凝神於中山與庾亮牋與庾亮牋王敦可人之目數十年間也
