body:
  text: 卷一表哀詩并序天地之德曰生生之所恃者親親存則歡泰情盡親亡則哀悴理極故老萊婆娑於膝下曾閔泣血於終年哀悼之思至矣自然之性篤矣余以薄祜夙遭閔凶越在九齡嚴考即世未及志學過庭無聞天覆既淪俯憑坤厚殖根外氏賴以成訓然以不才不能負荷仁妣弘母儀之德邁榮寒之操雕琢固頑勉以道義庶幾砥礪犬馬之報豈悟一朝復見孤棄上天極禍怨痛莫訴皆由惡積咎深不能通感自丁荼毒載離寒暑茵帷塵寂楝宇寥恍仰悲軌迹長自矜悼不勝哀號作詩一首敢冒諒暗之譏以申罔極之痛詩曰茫茫太極賦受理殊咨生不辰仁考宿徂微微沖弱眇眇偏孤叩心昊蒼痛貫黃壚肅我以義鞠我以仁嚴邁商風恩洽陽春昔聞鄒母勤教善分懿矣慈妣曠世齊運嗟豫小子譬彼土糞俯愧陋質仰忝高訓悠悠玄運四氣錯序自我酷痛載離寒暑寥寥空堂寂寂響戶塵蒙几筵風生棟宇感昔有恃望晨遲顏婉孌懷袖極願盡歡奈何慈妣歸體幽埏酷矣痛深剖髓摧肝類聚二十廣文選九詩紀三十二蘭亭蘭亭春詠登臺亦有臨流懷彼伐木宿此良儔修竹蔭沼旋瀨縈丘穿池激湍連濫觴舟戲鴻堂帖十詩紀三十三流風拂枉渚停雲蔭九皋鶯語吟修竹游鱗戲瀾濤攜筆落雲藻微言剖纖毫時珍豈不甘忘味在聞韶戲鴻堂帖十詩紀三十三廣文選九又輿地紀勝十引濤一韻贈溫嶠一首大朴無像鑽之者鮮玄風雖存微言靡演邈矣哲人測深鉤緬誰謂道遼得之無遠既綜幽紀亦理俗羅神濯無浪形渾俗波熲非我朗貴在光和振翰梧摽翻飛丹霞爰在沖齓質嶷韻令長崇簡易業大德盛體與榮辭迹與化競經緯天維翼亮皇政狡哉不臣拒順稱兵矯矯君侯杖鉞斯征鯨鯢懸鰓靈滸載清淨能弘道動功成無則無慕有必有希仰蔭風雲自同蘭夷辭以運情情詣名遺忘其言往鑒諸旨歸文館詞林百五十七與庾冰一首浩浩元化五運迭送昏明相錯否泰時用數鍾大過乾象摧棟惠懷淩搆神鑾不控德之不逮痛矣悲夫蠻夷交迹封豕充衢芒芒華夏鞠為戎墟哀兼黍離痛過茹荼天未忘晉乃眷東顧中宗奉時龍飛廓祚河洛雖堙淮海獲悆業業億兆相望道著天步艱難蹇運方資凶羯稽誅外憂未夷矧乃蕭牆仍生梟鴟逆兵纍遘三纏紫微遠惟自天抑亦由人道苟無虧釁故曷因遑遑遺黎死痛生勤撫運懷天地不仁蒸哉我皇哲嶷自然遠隆替思懷普天明發詢求德音遐宣臨政存化昵親尊賢親賢孰在實賴伯舅卓矣都鄉光此舉首苟云至公身非己有將敷徽猷仰讚聖后義存急病星駕路次穆爾平心不休不悴險無矜容商無淩氣形與務動志恬道味余與夫子分以情照如彼清風應此朗嘯契定一面遂隆雅好弛張雖殊宮商同調無湖之寓家子之館武昌之遊繾綣夕旦邂逅不已同集海畔宅仁懷舊用忘僑歎晏安難常理有會乖之子之性惆悵低徊子沖赤霄我戢蓬黎啓興歧路慨矣增懷我聞為政寬猛相革體非太上疇能全德鑒彼韋弦慎爾準墨人望在茲可不允塞古人重離必有贈遷千金之遺孰與片言勱矣庾生勉蹤前賢何以將行取諸斯篇文館詞林百五十七答許詢一首仰觀大造俯覽時物機過患生吉凶相拂智以利昏識由情屈野有寒枯朝有炎鬱震驚得必充詘峨峨高門鬼窺其庭奕奕華輪路險則傾前輈摧軸後鸞振鈴將隊競奔誨在臨頸達人悟始外身遺榮遺榮榮在外身身全卓哉先師修德就間散以玄風滌以清川或步崇基或恬蒙園道足胸懷神棲浩然咨余沖人稟此散質器不韜俗才不兼出斂衽告誠敢謝短質冥運超感遘我玄逸宅心遼廓咀嚼妙一孔父有言後生可畏灼灼許子挺奇拔萃方玉比瑩擬蘭等蔚寄懷大匠仰希遐致將隆千仞豈限一匱自我提攜倏忽四周契合一源好結回流泳必齊味翔必俱遊歡與時積遂隆綢繆一日不見情兼三秋矧乃路遐致茲乖違爾託西隅我滯斯畿寂寂委巷寥寥間扉淒風夜激皓雪晨霏隱機獨詠賞音者誰貽我新詩韻靈旨清粲如揮錦琅若叩瓊既欣夢解獨愧未冥慍在有身樂在忘生余則異矣無往不平理苟皆是何纍於情戒以古人邈彼巢皓千載絶塵山棲嘉遁亦有負薪量力守約敢希先人且戢讜言永以書紳文館詞林百五十七贈謝安一首緬哉冥古邈矣上皇夷明太素結紐靈綱不有其一二理曷彰幽源散流玄風吐芳芳扇則歇流引則遠朴以雕殘實由英翦捷徑交軫荒塗莫踐超哉沖悟乘雲獨反青松負雪白玉經飆鮮藻彌映素質逾昭凝神內湛未醨一澆遂從雅好高跱九霄洋洋浚泌藹藹丘園庭無亂轍室有清絃足不越疆談不離玄心憑浮雲氣齊皓然仰詠道誨俯膺俗教天生而靜物誘則躁全由抱朴災生發竅成歸前識孰能默覺曖曖幽人藏器掩曜涉易知損棲老測妙交存風流好因維縶自我不遘寒暑三襲漢文延賈知其弗及戴生之黃不覺長揖與爾造玄迹未偕入鳴翼既舒能不鶴立整翰望風庶同遙集文館詞林百五十七三月三日姑洗斡運首陽穆闡嘉卉萋萋溫風暖暖言滌長瀨聊以游衍縹芹渶流緑柳蔭坂羽從風飄鱗隨浪轉類聚四詩紀三十二又吳棫韻補三引闡暖二韻坂轉二韻秋日蕭瑟仲秋日飆唳風雲高山居感時變遠客興長謠疏林積涼風虛岫結凝霄湛露灑庭林密葉辭榮條撫菌悲先落鬱松羡後凋垂綸在林野交情遠市朝淡然古懷心濠上豈伊遙廣文選十五詩紀三十二又類聚三御覽二十五並作晉孫綽詩引高謠霄條凋五韻情人碧玉歌二首情人碧玉歌二首碧玉小家女不敢攀貴德感郎千金意慚無傾城色玉臺新詠十樂府詩集四十五詩紀三十二碧玉破瓜時相為情顛倒感郎不羞難回身就郎抱玉臺新詠十類聚四十三樂府詩集四十五詩紀三十二
